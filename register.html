<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixMyArea - Join Us</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Instant Theme Loader to prevent FOUC -->
    <script>
        (function() {
            var theme = localStorage.getItem('fixmyarea_theme');
            if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>
    <style>
        body {
            background: linear-gradient(rgba(37, 99, 235, 0.2), rgba(16, 185, 129, 0.2)), url('kozhikode_beach.png') center/cover no-repeat fixed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; margin: 0;
        }
        .login-card {
            background: var(--surface); padding: 3.5rem; border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl); max-width: 550px; width: 100%;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .login-logo { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; text-decoration: none; display:block; text-align:center;}
        .login-subtitle { color: var(--text-muted); margin-bottom: 2.5rem; font-size: 1.125rem; text-align:center; }
        .portal-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .portal-tab {
            flex: 1; padding: 1rem; font-weight: 600; cursor: pointer; color: var(--text-muted);
            border-bottom: 3px solid transparent; transition: all 0.2s; font-size: 0.95rem; text-align:center;
        }
        .portal-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    </style>
</head>
<body>

    <!-- Slide Menu & Overlay -->
    <div class="slide-menu-overlay" id="slideOverlay" onclick="document.getElementById('slideMenu').classList.remove('active'); this.classList.remove('active');"></div>
    <aside class="slide-menu" id="slideMenu">
        <button class="close-btn" onclick="document.getElementById('slideMenu').classList.remove('active'); document.getElementById('slideOverlay').classList.remove('active');"><i class="fa-solid fa-xmark"></i></button>
        <div style="padding: 0 2rem 2rem; border-bottom: 1px solid var(--border-light); margin-bottom: 1rem;">
            <div class="logo" style="font-size: 1.25rem; color:var(--primary); font-weight:800;"><i class="fa-solid fa-map-location-dot"></i> FixMyArea</div>
            <p style="color:var(--text-muted); font-size:0.875rem; margin-top:0.5rem;">Kozhikode Civic Portal</p>
        </div>
        <a href="index.html" class="menu-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="profile.html" class="menu-item"><i class="fa-solid fa-user-pen"></i> My Profile</a>
        <a href="settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> App Settings</a>
        <a href="about.html" class="menu-item"><i class="fa-solid fa-circle-info"></i> About Us</a>
        <a href="connect.html" class="menu-item"><i class="fa-solid fa-handshake-angle"></i> Join Volunteer</a>
    </aside>

    <div style="position:absolute; top: 1.5rem; left: 1.5rem; z-index:100;">
        <button id="btnHamburger" class="hamburger-icon" onclick="document.getElementById('slideMenu').classList.add('active'); document.getElementById('slideOverlay').classList.add('active');"><i class="fa-solid fa-bars" style="font-size:1.75rem;"></i></button>
    </div>

    <div class="login-card">
        <a href="index.html" class="login-logo"><i class="fa-solid fa-map-location-dot"></i> FixMyArea</a>
        <p class="login-subtitle">Join the movement to build a better city.</p>

        <div class="portal-tabs">
            <div class="portal-tab active" onclick="switchPortal('citizen')" id="tab-citizen">Citizen</div>
            <div class="portal-tab" onclick="switchPortal('admin')" id="tab-admin">Authority</div>
        </div>

        <form id="form-citizen" style="text-align: left;" class="reveal">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.25rem;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone (Optional)</label>
                    <input type="tel" id="regPhone" placeholder="+91 98765...">
                </div>
            </div>
            <div class="form-group">
                <label>Kozhikode Ward / Local Area</label>
                <input type="text" id="regWard" required placeholder="e.g. Ward 12 / Medical College">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="regPassword" required placeholder="At least 6 characters">
            </div>
            
            <button type="button" class="btn btn-primary btn-block" onclick="registerUser('citizen')" style="margin-top: 1rem; padding: 1rem;">
                Create Account <i class="fa-solid fa-check"></i>
            </button>
            <div style="text-align:center; margin-top: 2rem;">
                <p style="color:var(--text-muted); font-size:0.95rem; margin-bottom:0.5rem;">Already have an account?</p>
                <a href="login.html" style="color:var(--primary); font-weight:700; text-decoration:none;">Sign In instead</a>
            </div>
            <div id="citError" style="color:var(--status-pending); font-size:0.875rem; text-align:center; display:none; margin-top:1rem; font-weight: 600;"></div>
        </form>

        <form id="form-admin" style="text-align: left; display: none;" class="reveal">
            <div class="form-group">
                <label>Official Full Name</label>
                <input type="text" id="admRegName" required placeholder="Officer Name">
            </div>
            <div class="form-group">
                <label>Department / Authority Role</label>
                <input type="text" id="admRegDept" required placeholder="e.g. PWD, Kozhikode Corporation">
            </div>
            <div class="form-group">
                <label>Official Email Address</label>
                <input type="email" id="admRegEmail" required placeholder="official@fixmyarea.com">
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="admRegPassword" required placeholder="At least 6 characters">
            </div>
            
            <button type="button" class="btn btn-primary btn-block" onclick="registerUser('admin')" style="margin-top: 1rem; padding: 1rem;">
                Register Authority <i class="fa-solid fa-building-shield"></i>
            </button>
            <div style="text-align:center; margin-top: 2rem;">
                <p style="color:var(--text-muted); font-size:0.95rem; margin-bottom:0.5rem;">Already an authorized official?</p>
                <a href="login.html" style="color:var(--primary); font-weight:700; text-decoration:none;">Sign In to Authority Portal</a>
            </div>
            <div id="admError" style="color:var(--status-pending); font-size:0.875rem; text-align:center; display:none; margin-top:1rem; font-weight: 600;"></div>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const tab = params.get('portal');
            if (tab === 'admin') {
                switchPortal('admin');
            }
        });

        function switchPortal(type) {
            if (type === 'citizen') {
                document.getElementById('tab-citizen').classList.add('active');
                document.getElementById('tab-admin').classList.remove('active');
                document.getElementById('form-citizen').style.display = 'block';
                document.getElementById('form-admin').style.display = 'none';
            } else {
                document.getElementById('tab-admin').classList.add('active');
                document.getElementById('tab-citizen').classList.remove('active');
                document.getElementById('form-admin').style.display = 'block';
                document.getElementById('form-citizen').style.display = 'none';
            }
        }

        // Standalone Registration Script
        function registerUser(type) {
            const errorDiv = document.getElementById(type === 'citizen' ? "citError" : "admError");
            errorDiv.style.display = "none";
            
            let email, password, name, phone, ward, dept;
            if (type === 'citizen') {
                email = document.getElementById("regEmail").value.trim();
                password = document.getElementById("regPassword").value;
                name = document.getElementById("regName").value.trim();
                phone = document.getElementById("regPhone").value.trim();
                ward = document.getElementById("regWard").value.trim();
                
                if (!email || !password || !name || !ward) {
                    errorDiv.innerText = "Please fill in all required fields (Name, Ward, Email, Password).";
                    errorDiv.style.display = "block"; return;
                }
            } else {
                email = document.getElementById("admRegEmail").value.trim();
                password = document.getElementById("admRegPassword").value;
                name = document.getElementById("admRegName").value.trim();
                dept = document.getElementById("admRegDept").value.trim();
                
                if (!email || !password || !name || !dept) {
                    errorDiv.innerText = "Please fill in all official details (Name, Dept, Email, Password).";
                    errorDiv.style.display = "block"; return;
                }
            }
            
            // Mock user creation
            const uid = type + "_" + Date.now();
            const role = type; 
            
            const newUser = { uid, role, email, password, name, phone: phone||"", ward: ward||"", dept: dept||"" };
            
            // Save to Mock User DB
            const userDb = JSON.parse(localStorage.getItem("fixmyarea_mock_db") || "[]");
            userDb.push(newUser);
            localStorage.setItem("fixmyarea_mock_db", JSON.stringify(userDb));

            // Set as active session
            localStorage.setItem("fixmyarea_user", JSON.stringify(newUser));
            
            // Redirect based on role
            if (newUser.role === 'admin') {
                window.location.href = "index.html";
            } else {
                window.location.href = "report.html";
            }
        }
    </script>
</body>
</html>
