<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixMyArea - User Profile</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Theme loading and common utils -->
    <script src="common.js"></script>
    <style>
        .profile-container {
            max-width: 800px; margin: 4rem auto; padding: 2rem;
            background: var(--surface); border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg); border: 1px solid var(--border-light);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .profile-header-sec {
            display: flex; align-items: center; gap: 2rem; margin-bottom: 3rem;
            padding-bottom: 2rem; border-bottom: 1px solid var(--border);
        }
        .huge-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            color: white; display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 800; box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>

    <!-- Slide Menu & Overlay -->
    <div class="slide-menu-overlay" id="slideOverlay" onclick="document.getElementById('slideMenu').classList.remove('active'); this.classList.remove('active');"></div>
    <aside class="slide-menu" id="slideMenu">
        <button class="close-btn" onclick="document.getElementById('slideMenu').classList.remove('active'); document.getElementById('slideOverlay').classList.remove('active');"><i class="fa-solid fa-xmark"></i></button>
        <div style="padding: 0 2rem 2rem; border-bottom: 1px solid var(--border-light); margin-bottom: 1rem;">
            <div class="logo" style="font-size: 1.25rem; color:var(--primary); font-weight:800;"><i class="fa-solid fa-map-location-dot"></i> FixMyArea</div>
            <p style="color:var(--text-muted); font-size:0.875rem; margin-top:0.5rem;">Kozhikode Civic Portal</p>
        </div>
        <a href="index.html" class="menu-item" data-i18n="dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="profile.html" class="menu-item" data-auth="user" style="border-left-color: var(--primary); background: var(--primary-light); color: var(--primary);" data-i18n="profile"><i class="fa-solid fa-user-pen"></i> <span id="navUserName">My Profile</span></a>
        <a href="settings.html" class="menu-item" data-auth="user" data-i18n="settings"><i class="fa-solid fa-gear"></i> App Settings</a>
        <a href="noti.html" class="menu-item" data-auth="user" data-i18n="latestNews"><i class="fa-solid fa-bell"></i> Notifications</a>
        <a href="about.html" class="menu-item" data-i18n="about"><i class="fa-solid fa-circle-info"></i> About Us</a>
        <a href="connect.html" class="menu-item" data-i18n="connect"><i class="fa-solid fa-handshake-angle"></i> Join Volunteer</a>
        <a href="login.html" class="menu-item" data-auth="guest"><i class="fa-solid fa-right-to-bracket" style="color:var(--primary);"></i> <span style="color:var(--primary); font-weight:700;">Sign In</span></a>
        <a href="#" class="menu-item" data-auth="user" onclick="logout()"><i class="fa-solid fa-right-from-bracket" style="color:var(--status-reopened);"></i> <span style="color:var(--status-reopened);" data-i18n="signOut">Sign Out</span></a>
    </aside>

    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:1.5rem;">
            <button id="btnHamburger" class="hamburger-icon" onclick="document.getElementById('slideMenu').classList.add('active'); document.getElementById('slideOverlay').classList.add('active');"><i class="fa-solid fa-bars"></i></button>
            <a href="index.html" class="logo" style="text-decoration:none;"><i class="fa-solid fa-map-location-dot"></i> FixMyArea</a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link" data-i18n="dashboard">Dashboard</a>
            <a href="profile.html" class="nav-link active" data-auth="user" data-i18n="profile">Profile</a>
            <a href="noti.html" class="nav-link" data-auth="user" data-i18n="latestNews">Notifications</a>
            <a href="about.html" class="nav-link" data-i18n="about">About Us</a>
            <a href="login.html" class="btn btn-outline" data-auth="guest">Sign In</a>
        </div>
        <div class="nav-actions" data-auth="user">
            <button onclick="window.location.href='profile.html'" class="btn btn-outline" style="border:none; padding:0.5rem;" title="Go to Profile">
                <i class="fa-solid fa-user-circle fa-2x" style="color:var(--text-muted);"></i>
            </button>
        </div>
    </nav>

    <main class="profile-container">
        <div class="profile-header-sec">
            <div class="profile-header-card">
                <div class="huge-avatar" id="hugeAvatar"><i class="fa-solid fa-user"></i></div>
                <div>
                    <h1 style="font-size: 2.5rem; color: var(--text-main); margin-bottom: 0.5rem;" id="displayTitleName">Loading...</h1>
                    <span class="priority-tag Medium" id="displayRoleBadge" style="font-size:1rem; padding: 0.25rem 0.75rem;">Account</span>
                </div>
            </div>
        </div>

        <form id="profileForm" style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem;">
            <div class="form-group" style="grid-column: span 2;">
                <label>Full Name</label>
                <input type="text" id="profName" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="profEmail" readonly style="background:var(--border-light); cursor:not-allowed;" title="Email cannot be changed">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="profPhone">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Kozhikode Ward / Local Area</label>
                <input type="text" id="profWard">
            </div>
            <div style="grid-column: span 2; display:flex; justify-content:space-between; align-items:center; margin-top:2rem; padding-top:2rem; border-top:1px solid var(--border-light);">
                <button type="button" class="btn btn-outline" onclick="deleteCurrentUserAccount()" style="color:var(--status-reopened); border-color:var(--status-reopened);"><i class="fa-solid fa-user-slash"></i> Delete Account</button>
                <div style="display:flex; gap:1rem;">
                    <a href="index.html" class="btn btn-outline" style="padding: 0.85rem 2rem;">Cancel</a>
                    <button type="button" class="btn btn-primary" onclick="saveProfile()" style="padding: 0.85rem 2rem;"><i class="fa-solid fa-floppy-disk"></i> Save Profile</button>
                </div>
            </div>
        </form>
        <div id="profSuccess" style="color:var(--status-resolved); font-weight:600; text-align:center; display:none; margin-top:2rem;"><i class="fa-solid fa-circle-check"></i> Profile updated successfully!</div>
    </main>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const checkAuth = setInterval(async () => {
                if (supabase && (await supabase.auth.getSession()).data.session) {
                    clearInterval(checkAuth);
                    const user = (await supabase.auth.getUser()).data.user;
                    
                    const { data: roleData } = await supabase.from('user_roles').select('role').eq('user_id', user.id).single();
                    const { data: profile } = await supabase.from('profiles').select('*').eq('user_id', user.id).single();
                    
                    const role = roleData?.role || 'citizen';
                    const name = profile?.full_name || user.email.split('@')[0];
                    
                    document.getElementById("hugeAvatar").innerText = name.charAt(0).toUpperCase();
                    document.getElementById("displayTitleName").innerText = name;
                    document.getElementById("displayRoleBadge").innerText = role.charAt(0).toUpperCase() + role.slice(1) + " Account";
                    
                    document.getElementById("profName").value = name;
                    document.getElementById("profEmail").value = user.email || "";
                    document.getElementById("profPhone").value = profile?.phone || "";
                    document.getElementById("profWard").value = profile?.ward || "";
                }
            }, 500);
        });
    </script>
</body>
</html>
